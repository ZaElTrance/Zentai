<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HenVideo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0f0f0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden;height:100%}
:focus{outline:none;box-shadow:0 0 0 3px #7c3aed,0 0 20px rgba(124,58,237,.4);transform:scale(1.03);z-index:10;transition:all .15s ease}
.nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(15,15,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;height:64px;padding:0 24px}
.nav-logo{display:flex;align-items:center;gap:8px;margin-right:32px;cursor:pointer;color:#a78bfa}
.nav-logo svg{width:28px;height:28px}
.nav-logo span{font-size:20px;font-weight:700;letter-spacing:-.02em}
.nav-link{font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.nav-link:hover,.nav-link.active{color:#a78bfa;border-bottom-color:#7c3aed}
.nav-search{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-search-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);cursor:pointer;font-size:13px}
.search-bar{display:none;align-items:center;gap:8px}
.search-bar.open{display:flex}
.search-input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 16px;color:#fff;font-size:13px;width:240px}
.search-input::placeholder{color:rgba(255,255,255,.4)}
.search-input:focus{box-shadow:0 0 0 3px #7c3aed;outline:none;transform:none}
.search-go{background:#7c3aed;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:500;font-size:13px;cursor:pointer}
.search-close{color:rgba(255,255,255,.5);cursor:pointer;padding:8px;font-size:14px}
.main{padding-top:64px}
.hero{position:relative;width:100%;height:55vh;min-height:350px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:background-image .7s}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,#0f0f0f 0%,transparent 60%)}
.hero-grad2{position:absolute;inset:0;background:linear-gradient(to right,rgba(15,15,15,.9),rgba(15,15,15,.4),transparent)}
.hero-content{position:absolute;bottom:48px;left:32px;right:32px;z-index:10}
.hero-title{font-size:2.5rem;font-weight:700;margin-bottom:12px;max-width:600px;line-height:1.15;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.hero-meta{display:flex;align-items:center;gap:16px;font-size:13px;color:rgba(255,255,255,.7);margin-bottom:20px;flex-wrap:wrap}
.hero-meta .brand{color:#a78bfa;font-weight:500}
.hero-meta .tag{background:rgba(255,255,255,.1);padding:2px 8px;border-radius:4px;font-size:11px}
.hero-btn{display:inline-flex;align-items:center;gap:8px;background:#7c3aed;color:#fff;padding:12px 32px;border-radius:8px;font-weight:600;font-size:16px;cursor:pointer;border:none;transition:background .15s}
.hero-btn:hover{background:#6d28d9}
.hero-dots{display:flex;gap:8px;margin-top:20px}
.hero-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;border:none;transition:all .3s}
.hero-dot.active{background:#7c3aed;width:32px;border-radius:5px}
.row{margin-bottom:24px}
.row-header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;margin-bottom:8px}
.row-title{font-size:17px;font-weight:700;color:rgba(255,255,255,.9)}
.row-nav{display:flex;gap:8px}
.row-nav button{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.05);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.row-nav button:hover{background:rgba(255,255,255,.1)}
.row-scroll{display:flex;gap:12px;overflow-x:auto;padding:8px 24px;scroll-behavior:smooth;scrollbar-width:none}
.row-scroll::-webkit-scrollbar{display:none}
.card{flex-shrink:0;width:176px;border-radius:8px;overflow:hidden;background:#1a1a2e;cursor:pointer;transition:transform .2s,box-shadow .2s}
.card:hover{transform:scale(1.05);box-shadow:0 0 0 3px #7c3aed,0 0 25px rgba(124,58,237,.5);z-index:10}
.card-img{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:#2a2a3e}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-family:monospace}
.card-img .uncen{position:absolute;top:6px;left:6px;background:rgba(34,197,94,.8);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;text-transform:uppercase}
.card-info{padding:10px}
.card-name{font-size:11px;font-weight:500;color:rgba(255,255,255,.9);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;margin-bottom:4px}
.card-sub{font-size:10px;color:rgba(255,255,255,.4);display:flex;gap:8px}
.card-sub .brand{color:rgba(167,139,250,.7)}
.detail{min-height:100vh}
.detail-back{position:fixed;top:80px;left:24px;z-index:30;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.6);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);border:none}
.detail-hero{position:relative;width:100%;height:50vh;min-height:300px;overflow:hidden}
.detail-hero .bg{position:absolute;inset:0;background-size:cover;background-position:center}
.detail-hero .grad{position:absolute;inset:0;background:linear-gradient(to top,#0f0f0f,transparent 60%),linear-gradient(to right,rgba(15,15,15,.8),transparent)}
.detail-body{position:relative;margin-top:-128px;z-index:10;padding:0 32px 32px;display:flex;gap:32px}
.detail-poster{flex-shrink:0;width:192px}
.detail-poster img{width:192px;aspect-ratio:3/4;border-radius:8px;object-fit:cover;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.detail-info{flex:1;padding-top:16px}
.detail-title{font-size:1.875rem;font-weight:700;margin-bottom:12px}
.detail-meta{display:flex;align-items:center;gap:16px;font-size:13px;color:rgba(255,255,255,.6);margin-bottom:16px;flex-wrap:wrap}
.detail-meta .brand{color:#a78bfa;font-weight:500}
.detail-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.detail-tags span{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:4px 12px;border-radius:20px;font-size:11px}
.detail-desc{color:rgba(255,255,255,.6);font-size:13px;line-height:1.6;margin-bottom:24px;max-width:640px}
.detail-play{display:inline-flex;align-items:center;gap:12px;background:#7c3aed;color:#fff;padding:16px 40px;border-radius:8px;font-weight:700;font-size:17px;cursor:pointer;border:none;box-shadow:0 8px 24px rgba(124,58,237,.2);transition:background .15s}
.detail-play:hover{background:#6d28d9}
.player{position:fixed;inset:0;z-index:50;background:#000}
.player video{width:100%;height:100%;object-fit:contain}
.player-back{position:absolute;top:16px;left:16px;z-index:60;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.7);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);border:none}
.player-title{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:60;background:rgba(0,0,0,.7);padding:8px 16px;border-radius:8px;backdrop-filter:blur(8px);font-size:13px}
.search-view{padding:24px}
.search-view h1{font-size:1.875rem;font-weight:700;margin-bottom:24px}
.search-bar-full{display:flex;gap:12px;max-width:640px;margin-bottom:32px}
.search-bar-full input{flex:1;background:#1a1a2e;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 20px;color:#fff;font-size:16px}
.search-bar-full input::placeholder{color:rgba(255,255,255,.3)}
.search-bar-full input:focus{box-shadow:0 0 0 3px #7c3aed;outline:none;transform:none}
.search-bar-full button{background:#7c3aed;color:#fff;padding:12px 32px;border-radius:8px;font-weight:600;font-size:16px;cursor:pointer;border:none}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:16px}
.search-grid .card{width:100%}
.spinner{display:flex;justify-content:center;padding:80px 0}
.spinner-circle{width:48px;height:48px;border:4px solid rgba(124,58,237,.3);border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{text-align:center;padding:80px 24px;color:#f87171;font-size:16px}
.error-box button{margin-top:16px;background:#7c3aed;color:#fff;padding:8px 24px;border-radius:8px;border:none;cursor:pointer}
.skeleton{background:linear-gradient(90deg,#1a1a2e 25%,#2a2a3e 50%,#1a1a2e 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.scroll-area{overflow-y:auto;height:calc(100vh - 64px);padding-bottom:80px;scrollbar-width:thin;scrollbar-color:#333 transparent}
.scroll-area::-webkit-scrollbar{width:4px}
.scroll-area::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <div class="nav-logo" onclick="goHome()" tabindex="0">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="#7c3aed"/></svg>
    <span>HenVideo</span>
  </div>
  <div class="nav-link active" id="nav-home" onclick="goHome()" tabindex="0">Home</div>
  <div class="nav-link" id="nav-browse" onclick="goBrowse()" tabindex="0">Browse</div>
  <div class="nav-link" id="nav-search" onclick="goSearch()" tabindex="0">Search</div>
  <div class="nav-search">
    <div class="nav-search-btn" id="navSearchBtn" onclick="toggleNavSearch()" tabindex="0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </div>
    <div class="search-bar" id="navSearchBar">
      <input class="search-input" id="navSearchInput" placeholder="Quick search..." onkeydown="if(event.key==='Enter')doNavSearch()">
      <button class="search-go" onclick="doNavSearch()">Go</button>
      <span class="search-close" onclick="closeNavSearch()">✕</span>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main">
  <!-- HOME VIEW -->
  <div id="viewHome" class="scroll-area">
    <div id="heroArea"></div>
    <div id="rowsArea" style="margin-top:-64px;position:relative;z-index:10"></div>
  </div>

  <!-- SEARCH VIEW -->
  <div id="viewSearch" class="scroll-area hidden">
    <div class="search-view">
      <h1>Search</h1>
      <div class="search-bar-full">
        <input id="searchInput" placeholder="Search for videos..." onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">Search</button>
      </div>
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="viewDetail" class="scroll-area hidden"></div>

  <!-- PLAYER VIEW -->
  <div id="viewPlayer" class="player hidden"></div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const CORS_PROXY = 'https://api.codetabs.com/v1/proxy/?quest=';
const HANI_API = 'https://hanime.tv/api/v8';
const SEARCH_API = 'https://search.htv-services.com';

// ─── STATE ─────────────────────────────────────────────────────────────────
let sections = [];
let heroVideos = [];
let heroIndex = 0;
let heroTimer = null;
let currentView = 'home';
let selectedVideo = null;
let hlsInstance = null;

// ─── API ───────────────────────────────────────────────────────────────────
async function apiFetch(url) {
  const res = await fetch(CORS_PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error('API error ' + res.status);
  return res.json();
}

async function fetchLanding() {
  const data = await apiFetch(HANI_API + '/landing');
  const videoMap = new Map();
  (data.hentai_videos || []).forEach(v => videoMap.set(Number(v.id), v));
  const result = [];
  (data.sections || []).forEach(sec => {
    const vids = (sec.hentai_video_ids || []).map(id => videoMap.get(Number(id))).filter(Boolean);
    if (vids.length) result.push({ title: sec.title || 'Featured', content: vids });
  });
  if (!result.length && data.hentai_videos?.length) {
    result.push({ title: 'Trending', content: data.hentai_videos.slice(0, 24) });
  }
  return result;
}

async function fetchSearch(query) {
  const data = await apiFetch(SEARCH_API + '/');
  // codetabs doesn't support POST, so search won't work properly
  // Fallback: use landing data for now
  return [];
}

async function fetchVideoDetail(slug) {
  return apiFetch(HANI_API + '/video?id=' + encodeURIComponent(slug));
}

// ─── UTILITY ───────────────────────────────────────────────────────────────
function fmtViews(n) {
  if (!n) return '';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return '' + n;
}
function getDur(v) {
  if (v.duration_in_ms) return Math.round(v.duration_in_ms / 1000);
  return v.duration || 0;
}
function fmtDur(s) {
  if (!s) return '';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}
function getImg(v) { return v.cover_url || v.poster_url || v.poster || v.thumbnail_url || ''; }

// ─── NAVIGATION ────────────────────────────────────────────────────────────
function showView(name) {
  currentView = name;
  document.getElementById('viewHome').classList.toggle('hidden', name !== 'home');
  document.getElementById('viewSearch').classList.toggle('hidden', name !== 'search');
  document.getElementById('viewDetail').classList.toggle('hidden', name !== 'detail');
  document.getElementById('viewPlayer').classList.toggle('hidden', name !== 'player');
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + (name === 'detail' || name === 'player' ? 'home' : name));
  if (navEl) navEl.classList.add('active');
  if (name === 'player' || name === 'detail') {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  }
}

function goHome() { showView('home'); }
function goBrowse() { showView('home'); }
function goSearch() { showView('search'); document.getElementById('searchInput')?.focus(); }

function toggleNavSearch() {
  const bar = document.getElementById('navSearchBar');
  const btn = document.getElementById('navSearchBtn');
  bar.classList.toggle('open');
  btn.style.display = bar.classList.contains('open') ? 'none' : 'flex';
  if (bar.classList.contains('open')) document.getElementById('navSearchInput').focus();
}
function closeNavSearch() {
  document.getElementById('navSearchBar').classList.remove('open');
  document.getElementById('navSearchBtn').style.display = 'flex';
}
function doNavSearch() {
  const q = document.getElementById('navSearchInput').value.trim();
  if (q) { document.getElementById('searchInput').value = q; goSearch(); doSearch(); closeNavSearch(); }
}

// ─── HERO ──────────────────────────────────────────────────────────────────
function renderHero() {
  if (!heroVideos.length) return;
  const v = heroVideos[heroIndex];
  const img = getImg(v);
  const dur = getDur(v);
  document.getElementById('heroArea').innerHTML = `
    <div class="hero">
      <div class="hero-bg" style="background-image:url(${img})"></div>
      <div class="hero-grad"></div>
      <div class="hero-grad2"></div>
      <div class="hero-content">
        <h1 class="hero-title">${v.name}</h1>
        <div class="hero-meta">
          ${v.brand ? `<span class="brand">${v.brand}</span>` : ''}
          ${v.views ? `<span>${fmtViews(v.views)} views</span>` : ''}
          ${dur ? `<span>${fmtDur(dur)}</span>` : ''}
          ${(v.tags||[]).slice(0,3).map(t=>`<span class="tag">${t.text}</span>`).join('')}
        </div>
        <button class="hero-btn" onclick="selectVideo(${heroVideos.indexOf(v)})" tabindex="0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Watch Now
        </button>
        ${heroVideos.length > 1 ? `<div class="hero-dots">${heroVideos.map((_,i)=>`<button class="hero-dot${i===heroIndex?' active':''}" onclick="setHero(${i})" tabindex="0"></button>`).join('')}</div>` : ''}
      </div>
    </div>`;
}

function setHero(i) { heroIndex = i; renderHero(); }
function startHeroRotation() {
  if (heroTimer) clearInterval(heroTimer);
  if (heroVideos.length > 1) {
    heroTimer = setInterval(() => { heroIndex = (heroIndex + 1) % heroVideos.length; renderHero(); }, 6000);
  }
}

// ─── ROWS ──────────────────────────────────────────────────────────────────
function renderRows() {
  const container = document.getElementById('rowsArea');
  container.innerHTML = sections.map((sec, si) => `
    <div class="row">
      <div class="row-header">
        <h2 class="row-title">${sec.title}</h2>
        <div class="row-nav">
          <button onclick="scrollRow('row${si}',-1)" tabindex="0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button onclick="scrollRow('row${si}',1)" tabindex="0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
      <div class="row-scroll" id="row${si}">
        ${sec.content.map((v,vi) => cardHTML(v, si, vi)).join('')}
      </div>
    </div>`).join('');
}

function cardHTML(v, si, vi) {
  const img = getImg(v);
  const dur = getDur(v);
  return `<div class="card" onclick="selectVideo(${si},${vi})" tabindex="0">
    <div class="card-img">
      ${img ? `<img src="${img}" alt="${v.name}" loading="lazy" onerror="this.style.display='none'">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>'}
      ${dur ? `<div class="dur">${fmtDur(dur)}</div>` : ''}
      ${v.is_censored === false ? '<div class="uncen">Uncensored</div>' : ''}
    </div>
    <div class="card-info">
      <div class="card-name">${v.name}</div>
      <div class="card-sub">
        ${v.brand ? `<span class="brand">${v.brand}</span>` : ''}
        ${v.views ? `<span>${fmtViews(v.views)}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function scrollRow(id, dir) {
  const el = document.getElementById(id);
  if (el) el.scrollBy({ left: dir * 500, behavior: 'smooth' });
}

// ─── VIDEO SELECT ──────────────────────────────────────────────────────────
function selectVideo(si, vi) {
  let v;
  if (typeof si === 'number' && typeof vi === 'number') {
    v = sections[si]?.content[vi];
  } else {
    v = heroVideos[si];
  }
  if (!v) return;
  selectedVideo = v;
  renderDetail(v);
  showView('detail');
}

// ─── DETAIL VIEW ───────────────────────────────────────────────────────────
async function renderDetail(v) {
  const img = getImg(v);
  const dur = getDur(v);
  const container = document.getElementById('viewDetail');
  container.innerHTML = `
    <button class="detail-back" onclick="goBack()" tabindex="0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back
    </button>
    <div class="detail-hero">
      <div class="bg" style="background-image:url(${img})"></div>
      <div class="grad"></div>
    </div>
    <div class="detail-body">
      <div class="detail-poster"><img src="${img}" alt="${v.name}"></div>
      <div class="detail-info">
        <h1 class="detail-title">${v.name}</h1>
        <div class="detail-meta">
          ${v.brand ? `<span class="brand">${v.brand}</span>` : ''}
          ${v.views ? `<span>${fmtViews(v.views)} views</span>` : ''}
          ${dur ? `<span>${fmtDur(dur)}</span>` : ''}
          ${v.created_at ? `<span>${new Date(v.created_at).toLocaleDateString()}</span>` : ''}
        </div>
        <div id="detailTags" class="detail-tags">${(v.tags||[]).map(t=>`<span>${t.text}</span>`).join('')}</div>
        <div id="detailDesc" class="detail-desc"></div>
        <button class="detail-play" onclick="playVideo('${v.slug}')" tabindex="0">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Play
        </button>
        <div id="detailStreams" style="margin-top:24px"></div>
      </div>
    </div>`;

  // Fetch full details
  try {
    const detail = await fetchVideoDetail(v.slug);
    if (detail.video?.tags) {
      document.getElementById('detailTags').innerHTML = detail.video.tags.map(t=>`<span>${t.text}</span>`).join('');
    }
    if (detail.video?.description) {
      document.getElementById('detailDesc').textContent = detail.video.description;
    }
    if (detail.videos_manifest?.servers?.length) {
      document.getElementById('detailStreams').innerHTML = `<h3 style="font-size:17px;font-weight:600;margin-bottom:12px">Available Streams</h3>` +
        detail.videos_manifest.servers.map(s => `<div style="background:#1a1a2e;border-radius:8px;padding:16px;margin-bottom:8px;display:inline-block;margin-right:8px"><div style="font-size:13px;font-weight:500;color:#a78bfa;margin-bottom:8px">${s.name}</div><div style="display:flex;gap:8px">${s.streams.map(st=>`<span style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);padding:4px 8px;border-radius:4px;font-size:11px">${st.height}p</span>`).join('')}</div></div>`).join('');
    }
  } catch(e) { console.error('Detail fetch error:', e); }
}

// ─── PLAYER ────────────────────────────────────────────────────────────────
async function playVideo(slug) {
  const container = document.getElementById('viewPlayer');
  container.innerHTML = `<div class="spinner" style="height:100vh"><div class="spinner-circle"></div></div>`;
  showView('player');

  try {
    const detail = await fetchVideoDetail(slug);
    const servers = detail.videos_manifest?.servers || [];
    if (!servers.length) throw new Error('No streams');

    let best = null;
    for (const s of servers) for (const st of s.streams) {
      if (!best || st.height > best.height) best = st;
    }
    if (!best?.url) throw new Error('No stream URL');

    const videoName = detail.video?.name || selectedVideo?.name || '';

    container.innerHTML = `
      <button class="player-back" onclick="goBack()" tabindex="0">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back
      </button>
      ${videoName ? `<div class="player-title">${videoName}</div>` : ''}
      <video id="playerVideo" controls autoplay playsinline></video>`;

    const video = document.getElementById('playerVideo');
    if (best.url.includes('.m3u8') && Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: false });
      hlsInstance.loadSource(best.url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = best.url;
      video.addEventListener('loadedmetadata', () => video.play().catch(()=>{}));
    } else {
      video.src = best.url;
      video.addEventListener('loadeddata', () => video.play().catch(()=>{}));
    }
  } catch(e) {
    container.innerHTML = `<div class="error-box" style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center"><p style="font-size:18px;margin-bottom:16px">${e.message || 'Playback error'}</p><button onclick="goBack()">Go Back</button></div>`;
  }
}

// ─── SEARCH ────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const results = document.getElementById('searchResults');
  results.innerHTML = '<div class="spinner"><div class="spinner-circle"></div></div>';

  try {
    // Since codetabs can't proxy POST requests, we use the landing data as fallback
    // and filter client-side by name
    const allVideos = sections.flatMap(s => s.content);
    const filtered = allVideos.filter(v => v.name.toLowerCase().includes(q.toLowerCase()));
    
    if (filtered.length) {
      results.innerHTML = `<p style="color:rgba(255,255,255,.5);font-size:13px;margin-bottom:16px">${filtered.length} results</p>
        <div class="search-grid">${filtered.map((v,i) => cardHTML(v, -1, i)).join('')}</div>`;
    } else {
      results.innerHTML = `<div style="text-align:center;padding:80px 0;color:rgba(255,255,255,.4)"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 16px;opacity:.5;display:block"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No results for "${q}"</p></div>`;
    }
  } catch(e) {
    results.innerHTML = `<div class="error-box">Search error: ${e.message}</div>`;
  }
}

// ─── BACK ──────────────────────────────────────────────────────────────────
function goBack() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  if (currentView === 'player') showView('detail');
  else if (currentView === 'detail') showView('home');
  else showView('home');
}

// ─── KEYBOARD (D-PAD) ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' || e.key === 'Backspace') {
    if (currentView === 'player' || currentView === 'detail') {
      e.preventDefault();
      goBack();
    }
  }
});

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    sections = await fetchLanding();
    heroVideos = sections[0]?.content?.slice(0, 5) || [];
    renderHero();
    startHeroRotation();
    renderRows();
  } catch(e) {
    document.getElementById('rowsArea').innerHTML = `<div class="error-box"><p>Failed to load content</p><p style="font-size:13px;color:rgba(255,255,255,.4);margin:8px 0">${e.message}</p><button onclick="location.reload()">Retry</button></div>`;
  }
}

init();
</script>
