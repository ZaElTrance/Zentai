name: Build HenVideo APK (Local)

on:
  push:
    branches: [main, master]
    paths:
      - 'henvideo-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./henvideo-app
        run: npm install

      - name: Build APK locally
        working-directory: ./henvideo-app
        run: |
          npx expo prebuild --platform android
          cd android
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release.apk ../henvideo.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: henvideo-apk-${{ github.sha }}
          path: henvideo-app/henvideo.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ HenVideo Build Ready!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Télécharger l'APK:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Va dans **Artifacts**" >> $GITHUB_STEP_SUMMARY
          echo "2. Télécharge \`henvideo-apk-*\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Installe sur l'émulateur Android TV" >> $GITHUB_STEP_SUMMARY
