name: Build HenVideo APK (Optimized)

on:
  push:
    branches: [main, master]
    paths:
      - 'henvideo-app/**'
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'henvideo-app/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            henvideo-app/android/.gradle
            henvideo-app/android/app/build
          key: gradle-${{ hashFiles('henvideo-app/android/**/*.gradle*', 'henvideo-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: henvideo-app/node_modules
          key: node-${{ hashFiles('henvideo-app/package-lock.json') }}
          restore-keys: node-

      - name: Install dependencies
        working-directory: ./henvideo-app
        run: npm ci --prefer-offline

      - name: Build APK
        working-directory: ./henvideo-app
        run: |
          npx expo prebuild --platform android --no-install
          cd android
          ./gradlew assembleRelease --parallel --build-cache
          mv app/build/outputs/apk/release/app-release.apk ../henvideo.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: henvideo-apk-${{ github.sha }}
          path: henvideo-app/henvideo.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Build Ready!" >> $GITHUB_STEP_SUMMARY
          echo "Télécharge l'APK dans Artifacts" >> $GITHUB_STEP_SUMMARY
