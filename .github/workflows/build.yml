name: Build HenVideo APK

on:
  push:
    branches: [main, master]
    paths:
      - 'henvideo-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: henvideo-app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: |
            henvideo-app/android/gradle/wrapper/gradle-wrapper.properties
            henvideo-app/android/build.gradle
            henvideo-app/android/app/build.gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./henvideo-app
        run: npm ci || npm install

      - name: Patch SDK version (36 → 35 for compatibility)
        working-directory: ./henvideo-app
        run: bash scripts/patch-sdk-version.sh

      - name: Prebuild native project
        working-directory: ./henvideo-app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Patch node_modules for Gradle 8.14 compatibility
        working-directory: ./henvideo-app
        run: bash scripts/patch-gradle-compat.sh

      - name: Generate release signing key
        working-directory: ./henvideo-app/android
        run: |
          if [ ! -f release.keystore ]; then
            keytool -genkeypair -v \
              -keystore release.keystore \
              -alias henvideo \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass henvideo123 \
              -keypass henvideo123 \
              -dname "CN=HenVideo,OU=Dev,O=HenVideo,L=MTL,ST=QC,C=CA"
          fi

      - name: Configure signing
        working-directory: ./henvideo-app/android
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_STORE_PASSWORD: henvideo123
          MYAPP_UPLOAD_KEY_ALIAS: henvideo
          MYAPP_UPLOAD_KEY_PASSWORD: henvideo123
        run: |
          cd app
          if ! grep -q "signingConfigs" build.gradle; then
            sed -i '/buildTypes {/i\    signingConfigs {\n        release {\n            storeFile file("../release.keystore")\n            storePassword System.getenv("MYAPP_UPLOAD_STORE_PASSWORD")\n            keyAlias System.getenv("MYAPP_UPLOAD_KEY_ALIAS")\n            keyPassword System.getenv("MYAPP_UPLOAD_KEY_PASSWORD")\n        }\n    }\n' build.gradle
          fi
          sed -i 's/buildType release {/buildType release {\n            signingConfig signingConfigs.release/' build.gradle
          cd ..

      - name: Build Release APK
        working-directory: ./henvideo-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --parallel

      - name: Verify APK
        run: |
          APK="henvideo-app/android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then echo "❌ APK NOT FOUND"; exit 1; fi
          SIZE=$(stat -c%s "$APK")
          if [ "$SIZE" -lt 10000000 ]; then echo "❌ APK too small ($SIZE bytes)"; exit 1; fi
          echo "✅ APK verified: $(($SIZE / 1048576))MB"

      - name: Rename and upload APK
        run: |
          mv henvideo-app/android/app/build/outputs/apk/release/app-release.apk henvideo-app/HenVideo-v5-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HenVideo-APK
          path: henvideo-app/HenVideo-v5-release.apk
          retention-days: 30
