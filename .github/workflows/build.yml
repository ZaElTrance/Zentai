name: Build HenVideo APK

on:
  push:
    branches: [main, master]
    paths:
      - 'henvideo-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./henvideo-app
        run: npm ci || npm install

      - name: Prebuild native project
        working-directory: ./henvideo-app
        run: npx expo prebuild --platform android --clean

      - name: Bundle JavaScript for Android
        working-directory: ./henvideo-app
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Debug APK
        working-directory: ./henvideo-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --parallel

      - name: Rename APK
        run: mv henvideo-app/android/app/build/outputs/apk/debug/app-debug.apk henvideo-app/HenVideo-v2.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HenVideo-APK
          path: henvideo-app/HenVideo-v2.apk
          retention-days: 30
